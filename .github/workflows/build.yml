name: Build

on:
  push:
    branches: [master]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [master]
    paths:
      - 'src/**'
      - 'package.json'
      - 'electron-builder.*'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 1.0.0)'
        required: false
        type: string

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24.x'

jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ${{ matrix.runs-on }}

    strategy:
      matrix:
        include:
          - target: nsis
            runs-on: windows-latest
          - target: appx
            runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache node_modules
        uses: actions/cache@v5
        id: cache-node-modules
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('package.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm install

      - name: Build renderer
        run: npm run build:vite

      - name: Build main process
        run: npm run build:electron

      - name: Package NSIS installer
        if: matrix.target == 'nsis'
        run: npx electron-builder --win nsis --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package APPX
        if: matrix.target == 'appx'
        run: npx electron-builder --win appx --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: phlix-windows-${{ matrix.target }}
          path: |
            release/*.exe
            release/*.appx
            release/*.nupkg
          if-no-files-found: error

  release-latest:
    name: Update "latest" prerelease
    needs: build
    # On every master push, overwrite a rolling "latest" GitHub Release carrying
    # the RAW .exe/.appx as directly-downloadable assets. (GitHub Actions
    # artifacts are always served zipped — a Release is the only way to offer a
    # bare, clickable installer.) Skipped on PRs and tag pushes (tags cut a
    # versioned release via the `release` job below).
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download NSIS artifacts
        uses: actions/download-artifact@v8
        with:
          name: phlix-windows-nsis
          path: artifacts/nsis

      - name: Download APPX artifacts
        uses: actions/download-artifact@v8
        with:
          name: phlix-windows-appx
          path: artifacts/appx

      - name: Reset "latest" release + tag
        # Delete any existing rolling release and its tag so the recreated one
        # points at this commit and carries only the freshly-built installers
        # (no stale assets from a prior master build accumulate).
        run: gh release delete latest --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish "latest" prerelease
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: Latest (master)
          body: |
            Rolling build of the latest `master` commit (${{ github.sha }}).
            Download the raw installer directly — no zip:
            - **`.exe`** — NSIS installer (desktop install)
            - **`.appx`** — Windows Store / sideload package
          prerelease: true
          make_latest: false
          target_commitish: ${{ github.sha }}
          files: |
            artifacts/nsis/*.exe
            artifacts/appx/*.appx
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Create Release
    needs: build
    # Only publish a GitHub Release on a version tag — master/PR builds just
    # upload installer artifacts (above) without cutting a release.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download NSIS artifacts
        uses: actions/download-artifact@v8
        with:
          name: phlix-windows-nsis
          path: artifacts/nsis

      - name: Download APPX artifacts
        uses: actions/download-artifact@v8
        with:
          name: phlix-windows-appx
          path: artifacts/appx

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.event.inputs.version }}" != "" ]]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, 'beta') || contains(steps.version.outputs.VERSION, 'alpha') }}
          generate_release_notes: true
          files: |
            artifacts/nsis/*.exe
            artifacts/nsis/*.nupkg
            artifacts/appx/*.appx
            artifacts/appx/*.nupkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
